<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>ERPAC Chatbot – Test Local</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h2 {
            margin-bottom: 16px;
            color: #1a56db;
            font-size: 18px;
        }

        #chat {
            width: 420px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .12);
            display: flex;
            flex-direction: column;
            height: 560px;
        }

        #header {
            background: #1a56db;
            color: white;
            padding: 14px 18px;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #4ade80;
        }

        #msgs {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .bot {
            background: #f1f3f6;
            color: #111;
            align-self: flex-start;
            border-bottom-left-radius: 3px;
        }

        .usr {
            background: #1a56db;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
        }

        .sys {
            background: #fff3cd;
            color: #856404;
            align-self: center;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
        }

        #footer {
            border-top: 1px solid #e5e7eb;
            padding: 10px 12px;
            display: flex;
            gap: 8px;
        }

        #inp {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 9px 13px;
            font-size: 14px;
            outline: none;
        }

        #inp:focus {
            border-color: #1a56db;
        }

        #btn {
            background: #1a56db;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 9px 16px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        #btn:hover {
            background: #1648c0;
        }

        #sid {
            font-size: 11px;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        #reset {
            font-size: 12px;
            color: #e53e3e;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h2>🧪 ERPAC Chatbot – Test Local</h2>
    <div id="sid">session_id: <span id="sid-val"></span> — <span id="reset">Nouvelle session</span></div>

    <div id="chat">
        <div id="header">
            <div id="dot"></div>ERPAC – Assistant BTP
        </div>
        <div id="msgs"></div>
        <div id="footer">
            <input id="inp" placeholder="Votre message..." autofocus />
            <button id="btn">Envoyer</button>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/webhook';
        let SESSION = newSession();

        function newSession() {
            return 'local_' + Math.random().toString(36).slice(2, 9);
        }

        function resetSession() {
            SESSION = newSession();
            document.getElementById('sid-val').textContent = SESSION;
            document.getElementById('msgs').innerHTML = '';
            addMsg('bot', 'Bonjour 👋 Bienvenue chez ERPAC.\nComment puis-je vous aider ?\n\n• Services\n• Devis\n• Contact\n• Projets\n• Adresse');
        }

        function addMsg(type, text) {
            const d = document.getElementById('msgs');
            const m = document.createElement('div');
            m.className = 'msg ' + type;
            m.textContent = text;
            d.appendChild(m);
            d.scrollTop = d.scrollHeight;
        }

        function addSys(text) {
            const d = document.getElementById('msgs');
            const m = document.createElement('div');
            m.className = 'msg sys';
            m.textContent = text;
            d.appendChild(m);
            d.scrollTop = d.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('inp');
            const msg = inp.value.trim();
            if (!msg) return;
            inp.value = '';
            addMsg('usr', msg);

            try {
                const r = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: SESSION, message: msg })
                });
                const data = await r.json();
                addMsg('bot', data.reply);
                if (data.next_step && data.next_step !== 'idle') {
                    addSys('next_step: ' + data.next_step);
                }
            } catch (e) {
                addSys('❌ Serveur inaccessible – vérifiez que node server.js tourne sur le port 3000');
            }
        }

        document.getElementById('btn').onclick = send;
        document.getElementById('inp').onkeydown = e => { if (e.key === 'Enter') send(); };
        document.getElementById('reset').onclick = resetSession;

        document.getElementById('sid-val').textContent = SESSION;
        resetSession();
    </script>
</body>

</html>
