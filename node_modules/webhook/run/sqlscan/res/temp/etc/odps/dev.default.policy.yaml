"Version": "1"
"Statement":
  -
    "Effect": "Allow"
    "Action":
      - "odps:List"
      - "odps:CreateTable"
      - "odps:CreateInstance"
      - "odps:CreateResource"
      - "odps:CreateFunction"
    "Resource":
      - "acs:odps:*:projects/#{projectname}"
  -
    "Effect": "Allow"
    "Action":
      - "odps:*"
    "Resource":
      - "acs:odps:*:projects/#{projectname}/tables/*"
      - "acs:odps:*:projects/#{projectname}/functions/*"
      - "acs:odps:*:projects/#{projectname}/instances/*"
      - "acs:odps:*:projects/#{projectname}/resources/*"